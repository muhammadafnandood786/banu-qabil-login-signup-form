<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth App</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .view { display: none; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        .view.active { display: block; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .login-btn { background-color: #007bff; }
        .signup-btn { background-color: #28a745; }
        .footer-link { margin-top: 15px; font-size: 14px; }
        .footer-link a { color: #007bff; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Login View -->
    <div id="loginView" class="view active">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="text" id="loginUsername" placeholder="Username" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit" class="login-btn">Login</button>
        </form>
        <div class="footer-link">Don't have an account? <a onclick="showView('signupView')">Sign Up</a></div>
    </div>

    <!-- Sign Up View -->
    <div id="signupView" class="view">
        <h2>Sign Up</h2>
        <form id="signupForm">
            <input type="text" id="signupUsername" placeholder="Username" required>
            <input type="password" id="signupPassword" placeholder="Password" required>
            <button type="submit" class="signup-btn">Sign Up</button>
        </form>
        <div class="footer-link">Already have an account? <a onclick="showView('loginView')">Login</a></div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboardView" class="view">
        <h1>Welcome, <span id="usernameDisplay"></span>!</h1>
        <button id="logoutBtn" class="login-btn">Logout</button>
    </div>

    <script>
        const views = {
            login: document.getElementById('loginView'),
            signup: document.getElementById('signupView'),
            dashboard: document.getElementById('dashboardView')
        };

        function showView(viewId) {
            Object.values(views).forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        // Initialize state
        if (localStorage.getItem('loggedInUser')) {
            document.getElementById('usernameDisplay').textContent = localStorage.getItem('loggedInUser');
            showView('dashboardView');
        }

        // Sign Up Logic
        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            localStorage.setItem('registeredUsername', document.getElementById('signupUsername').value);
            localStorage.setItem('registeredPassword', document.getElementById('signupPassword').value);
            alert('Sign up successful!');
            showView('loginView');
        });

        // Login Logic
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('loginUsername').value;
            const pass = document.getElementById('loginPassword').value;
            if (user === localStorage.getItem('registeredUsername') && pass === localStorage.getItem('registeredPassword')) {
                localStorage.setItem('loggedInUser', user);
                document.getElementById('usernameDisplay').textContent = user;
                showView('dashboardView');
            } else {
                alert('Invalid credentials!');
            }
        });

        // Logout Logic
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('loggedInUser');
            showView('loginView');
        });
    </script>
</body>
</html>
